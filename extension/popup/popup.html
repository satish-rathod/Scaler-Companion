<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAFA;
            --bg-card: #FFFFFF;
            --bg-input: #F5F5F4;
            --text: #1C1917;
            --text-secondary: #78716C;
            --text-tertiary: #A8A29E;
            --border: #E7E5E4;
            --border-focus: #2563EB;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --accent-soft: rgba(37, 99, 235, 0.08);
            --accent-glow: rgba(37, 99, 235, 0.15);
            --green: #16A34A;
            --green-soft: rgba(22, 163, 74, 0.08);
            --green-border: rgba(22, 163, 74, 0.2);
            --red: #DC2626;
            --red-soft: rgba(220, 38, 38, 0.06);
            --red-border: rgba(220, 38, 38, 0.15);
            --orange: #EA580C;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 310px;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: var(--bg);
            font-size: 13px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- Header ---- */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #2563EB, #7C3AED);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25);
        }

        .logo svg {
            width: 14px;
            height: 14px;
        }

        .header-text {
            flex: 1;
            min-width: 0;
        }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            background: var(--green-soft);
            color: var(--green);
            border: 1px solid var(--green-border);
            transition: all 0.2s ease;
        }

        .status-indicator.offline {
            background: var(--red-soft);
            color: var(--red);
            border-color: var(--red-border);
        }

        .status-indicator.processing {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: rgba(37, 99, 235, 0.2);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        .status-indicator.processing .status-dot {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ---- Content ---- */
        .content {
            padding: 10px 14px 14px;
        }

        /* ---- Offline Banner ---- */
        .offline-banner {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
            background: var(--red-soft);
            border: 1px solid var(--red-border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--red);
            font-weight: 500;
            animation: slideDown 0.2s ease;
        }

        .offline-banner.visible {
            display: flex;
        }

        .offline-banner svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---- Empty State ---- */
        .empty-state {
            text-align: center;
            padding: 28px 16px;
        }

        .empty-state-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            background: var(--bg-input);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .empty-state-icon svg {
            width: 20px;
            height: 20px;
            color: var(--text-tertiary);
        }

        .empty-state h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ---- Lecture Section ---- */
        .lecture-section {
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ---- Lecture Card ---- */
        .lecture-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .lecture-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .lecture-icon {
            width: 34px;
            height: 34px;
            background: var(--accent-soft);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .lecture-icon svg {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }

        .lecture-info {
            flex: 1;
            min-width: 0;
        }

        .lecture-title {
            font-weight: 600;
            font-size: 13px;
            line-height: 1.4;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .lecture-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lecture-meta svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
        }

        .downloaded-badge {
            display: none;
            align-items: center;
            gap: 3px;
            background: var(--green-soft);
            color: var(--green);
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid var(--green-border);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .downloaded-badge svg {
            width: 12px;
            height: 12px;
        }

        /* ---- Time Inputs ---- */
        .time-inputs {
            display: flex;
            gap: 8px;
        }

        .time-input {
            flex: 1;
        }

        .time-input label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .time-input input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            background: var(--bg-input);
            transition: all 0.15s ease;
        }

        .time-input input::placeholder {
            color: var(--text-tertiary);
        }

        .time-input input:focus {
            outline: none;
            border-color: var(--border-focus);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ---- Buttons ---- */
        .btn {
            width: 100%;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .btn:hover {
            background: var(--bg-input);
            border-color: #D6D3D1;
        }

        .btn:active {
            transform: scale(0.985);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 1px 3px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-primary:disabled {
            box-shadow: none;
        }

        /* ---- Progress Section ---- */
        .progress-section {
            display: none;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.2s ease;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-stage {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .progress-stage svg {
            width: 14px;
            height: 14px;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-percent {
            font-size: 13px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-input);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563EB, #7C3AED);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 20px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-message {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ---- Post Download ---- */
        .post-download {
            display: none;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.2s ease;
        }

        /* ---- Footer ---- */
        .footer {
            padding: 8px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-tertiary);
            background: var(--bg-card);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.15s;
        }

        .footer a:hover {
            opacity: 0.8;
        }

        .footer-version {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            background: var(--bg-input);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
        </div>
        <div class="header-text">
            <div class="header-title">Scaler Companion</div>
            <div class="header-subtitle">Lecture Toolkit</div>
        </div>
        <div id="statusIndicator" class="status-indicator">
            <span class="status-dot"></span>
            <span id="statusLabel">Online</span>
        </div>
    </div>

    <div class="content">
        <!-- Offline Banner -->
        <div id="offlineBanner" class="offline-banner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>Backend offline — run <strong>./start.sh</strong> to connect</span>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/>
                </svg>
            </div>
            <h3>No Lecture Detected</h3>
            <p>Navigate to a Scaler Academy recording</p>
        </div>

        <!-- Lecture Section -->
        <div id="lectureSection" class="lecture-section">
            <!-- Lecture Card -->
            <div class="lecture-card">
                <div class="lecture-header">
                    <div class="lecture-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                    </div>
                    <div class="lecture-info">
                        <div id="lectureTitle" class="lecture-title">Loading...</div>
                        <div id="lectureMeta" class="lecture-meta">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                            </svg>
                            <span>Detecting stream...</span>
                        </div>
                    </div>
                    <span id="downloadedBadge" class="downloaded-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        <span>Downloaded</span>
                    </span>
                </div>
            </div>

            <!-- Time Inputs -->
            <div id="timeInputs" class="time-inputs">
                <div class="time-input">
                    <label>Start Time</label>
                    <input type="text" id="startTime" placeholder="00:00:00">
                </div>
                <div class="time-input">
                    <label>End Time</label>
                    <input type="text" id="endTime" placeholder="00:00:00">
                </div>
            </div>

            <!-- Download Button -->
            <button id="downloadBtn" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download Lecture
            </button>

            <!-- Progress Section -->
            <div id="progressSection" class="progress-section">
                <div class="progress-header">
                    <span id="progressStage" class="progress-stage">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                        </svg>
                        Downloading
                    </span>
                    <span id="progressPercent" class="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div id="progressMessage" class="progress-message">Starting...</div>
            </div>

            <!-- Post Download Actions -->
            <div id="postDownload" class="post-download">
                <button id="dashboardBtn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    Open Dashboard
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span class="footer-version">v2.0</span>
        <a href="http://localhost:3000" target="_blank">Open Dashboard</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
